name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (default members)
        run: cargo clippy --workspace -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    needs: [clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --workspace --release

  doc:
    name: Docs
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --workspace --no-deps --document-private-items

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    # NOTE: Integration tests require a local Subtensor node.
    # On self-hosted runners with Docker, use the service container below.
    # GitHub-hosted runners: the docker service will work if port 3100-3199 is available.
    services:
      subtensor-node:
        image: opentensor/subtensor:latest
        ports:
          - 3100:3100
          - 3101:3101
        options: >-
          --name subtensor
          --health-cmd "curl -f http://localhost:3100/health || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
    env:
      SUBTENSOR_ENDPOINT: ws://localhost:3101
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: cargo test --workspace -- --ignored

  pyo3:
    name: PyO3 Python Bindings
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin
        run: pip install maturin[patchelf]
      - name: Build Python wheel
        working-directory: bittensor-pyo3
        run: maturin develop
      - name: Install test dependencies
        run: pip install pytest
      - name: Run Python tests
        working-directory: bittensor-pyo3
        run: pytest tests/ -v

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        working-directory: bittensor-wasm
        run: wasm-pack build --target web
      - name: Test WASM
        working-directory: bittensor-wasm
        run: wasm-pack test --headless --chrome
