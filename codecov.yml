coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%

ignore:
  - "bittensor-chain/src/generated.rs"
  - "bittensor-wasm/**"
  - "bittensor-examples/**"
  - "*/tests/**"

comment:
  layout: "header, diff, files"
  behavior: default
