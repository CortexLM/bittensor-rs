services:
  subtensor-node:
    image: ghcr.io/opentensor/subtensor:latest
    container_name: subtensor-devnet
    restart: unless-stopped
    command: >
      --dev
      --tmp
      --rpc-external
      --ws-external
      --rpc-cors all
      --rpc-methods unsafe
      --ws-port 9944
      --rpc-port 9933
      --port 30333
      --no-telemetry
      --validator
    ports:
      - "31444:9944"  # WebSocket RPC
      - "31333:9933"  # HTTP RPC
      - "31033:30333" # P2P (inter-container)
    healthcheck:
      test: ["CMD", "curl", "-s", "-f", "http://localhost:9933/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
